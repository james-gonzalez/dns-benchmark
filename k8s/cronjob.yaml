apiVersion: batch/v1
kind: CronJob
metadata:
  name: dns-bench
  namespace: dns-benchmark
  labels:
    app: dns-bench
spec:
  # Run at 06:00, 12:00, and 18:00 UTC every day
  schedule: "0 6,12,18 * * *"
  timeZone: "UTC"
  concurrencyPolicy: Forbid        # skip if previous run is still going
  successfulJobsHistoryLimit: 3
  failedJobsHistoryLimit: 3
  jobTemplate:
    spec:
      ttlSecondsAfterFinished: 3600
      backoffLimit: 2
      template:
        metadata:
          labels:
            app: dns-bench
        spec:
          restartPolicy: OnFailure
          # Use 8.8.8.8 directly for DNS resolution so DoH server hostnames
          # (dns.google, dns.quad9.net, etc.) resolve to their real public IPs
          # rather than being intercepted by the cluster's internal DNS/gateway.
          dnsPolicy: None
          dnsConfig:
            nameservers:
              - 8.8.8.8
              - 1.1.1.1
            searches: []
          containers:
            - name: dns-bench
              image: ghcr.io/james-gonzalez/dns-benchmark:latest
              imagePullPolicy: Always
              resources:
                requests:
                  cpu: 250m
                  memory: 128Mi
                limits:
                  cpu: 1000m
                  memory: 256Mi
              volumeMounts:
                - name: config
                  mountPath: /config
                  readOnly: true
                - name: results
                  mountPath: /results
          volumes:
            - name: config
              configMap:
                name: dns-bench-config
            - name: results
              persistentVolumeClaim:
                claimName: dns-bench-results
