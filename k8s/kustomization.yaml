apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: dns-benchmark

resources:
  - namespace.yaml
  - configmap.yaml
  - pvc.yaml
  - cronjob.yaml
  - nginx.yaml
  - referencegrant.yaml
  # httproute.yaml is applied separately (kubectl apply -f k8s/httproute.yaml)
  # because kustomize's namespace override would move it out of 'default',
  # breaking the reference to shared-gateway.

# ── Image override ─────────────────────────────────────────────────────────────
# Automatically kept up to date by the release pipeline.
# The CI pushes ghcr.io/james-gonzalez/dns-benchmark:<version> and :latest.
images:
  - name: ghcr.io/james-gonzalez/dns-benchmark
    newTag: latest
